<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spielplangenerator Spielfest</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
      color: #111;
    }
    h1 {
      margin-bottom: 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input, select, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      padding: 10px;
      border: 1px solid #bbb;
      border-radius: 8px;
    }
    button {
      cursor: pointer;
      background: #0b5fff;
      color: #fff;
      border: none;
      font-weight: 700;
    }
    button.secondary {
      background: #e9eef7;
      color: #111;
      border: 1px solid #c9d5ea;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 18px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #f5f7fb;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    .error {
      color: #b00020;
      font-weight: 700;
      margin-top: 10px;
    }
    .ok {
      color: #0b6b2f;
      font-weight: 700;
      margin-top: 10px;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .toolbar button {
      width: auto;
      min-width: 180px;
    }
    pre {
      white-space: pre-wrap;
      background: #f7f7f7;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      overflow: auto;
    }
    .hint {
      background: #fff8d6;
      border: 1px solid #ead37b;
      padding: 10px;
      border-radius: 8px;
      margin-top: 10px;
    }
    @media print {
      #generateBtn, #copyTxtBtn, #printBtn, #status, .hint, .grid {
        display: none;
      }
    }
  </style>
</head>
<body>
  <h1>Spielplangenerator Spielfest</h1>
  <p class="muted">Jeder gegen jeden. Teams werden automatisch als A, B, C ... bezeichnet.</p>

  <div class="grid">
    <div>
      <label for="teams">Anzahl Teams</label>
      <input id="teams" type="number" min="2" value="4" />
    </div>
    <div>
      <label for="courts">Anzahl Körbe gleichzeitig nutzbar</label>
      <select id="courts">
        <option value="2" selected>2 Körbe</option>
        <option value="3">3 Körbe</option>
        <option value="4">4 Körbe</option>
      </select>
    </div>
    <div>
      <label for="gameMinutes">Spieldauer pro Spiel (Minuten)</label>
      <input id="gameMinutes" type="number" min="1" value="7" />
    </div>
    <div>
      <label for="switchMinutes">Wechselzeit zwischen Spielen (Minuten)</label>
      <input id="switchMinutes" type="number" min="0" value="3" />
    </div>
    <div>
      <label for="startTime">Startzeit</label>
      <input id="startTime" type="time" value="09:45" />
    </div>
    <div>
      <label for="endTime">Endzeit Turnier</label>
      <input id="endTime" type="time" value="12:30" />
    </div>
    <div>
      <label for="checkinMinutes">Begrüßung / Check-In vor Start (Minuten)</label>
      <input id="checkinMinutes" type="number" min="0" value="30" />
    </div>
    <div>
      <label for="breakMinutes">Pause nach komplettem Durchlauf (Minuten)</label>
      <input id="breakMinutes" type="number" min="0" value="10" />
    </div>
  </div>

  <div class="toolbar">
    <button id="generateBtn">Spielplan erzeugen</button>
    <button class="secondary" id="copyTxtBtn">Plan als Text kopieren</button>
    <button class="secondary" id="printBtn">Drucken</button>
  </div>

  <div id="status"></div>
  <div id="summary"></div>
  <div id="tableWrap"></div>
  <div id="textWrap"></div>

  <script>
    const teamNames = (n) => {
      const names = [];
      for (let i = 0; i < n; i++) names.push(String.fromCharCode(65 + i));
      return names;
    };

    const roundRobin = (teams) => {
      const arr = teams.slice();
      if (arr.length % 2 === 1) arr.push('BYE');
      const n = arr.length;
      const rounds = n - 1;
      const half = n / 2;
      const out = [];
      for (let r = 0; r < rounds; r++) {
        const pairs = [];
        for (let i = 0; i < half; i++) {
          const a = arr[i];
          const b = arr[n - 1 - i];
          if (a !== 'BYE' && b !== 'BYE') pairs.push([a, b]);
        }
        out.push(pairs);
        arr.splice(1, 0, arr.pop());
      }
      return out;
    };

    const pad = (n) => String(n).padStart(2, '0');

    const addMinutes = (timeStr, mins) => {
      const parts = timeStr.split(':');
      if (parts.length !== 2) return timeStr;
      const h = parseInt(parts[0], 10) || 0;
      const m = parseInt(parts[1], 10) || 0;
      const d = new Date();
      d.setHours(h, m, 0, 0);
      d.setMinutes(d.getMinutes() + (mins || 0));
      return pad(d.getHours()) + ':' + pad(d.getMinutes());
    };

    const timeGte = (a, b) => {
      const [aH, aM] = a.split(':').map(Number);
      const [bH, bM] = b.split(':').map(Number);
      if (!Number.isFinite(aH) || !Number.isFinite(aM)) return false;
      if (!Number.isFinite(bH) || !Number.isFinite(bM)) return false;
      if (aH > bH) return true;
      if (aH < bH) return false;
      return aM >= bM;
    };

    let lastSchedule = [];

    function buildSchedule() {
      const inputTeams = document.getElementById('teams').value;
      const n = Number(inputTeams);

      const courtsSelect = document.getElementById('courts');
      const courts = Number(courtsSelect.value);

      const gameMinutesInput = Number(document.getElementById('gameMinutes').value);
      const switchMinutesInput = Number(document.getElementById('switchMinutes').value);
      const startTime = document.getElementById('startTime').value;
      const endTime = document.getElementById('endTime').value;
      const checkinMinutesInput = Number(document.getElementById('checkinMinutes').value);
      const breakMinutesInput = Number(document.getElementById('breakMinutes').value);

      const status = document.getElementById('status');
      const summary = document.getElementById('summary');
      const tableWrap = document.getElementById('tableWrap');
      const textWrap = document.getElementById('textWrap');

      if (!Number.isInteger(n) || n < 2) {
        status.innerHTML = '<div class="error">Bitte mindestens 2 Teams eingeben.</div>';
        return;
      }

      if (![2, 3, 4].includes(courts)) {
        status.innerHTML = '<div class="error">Bitte nur 2, 3 oder 4 Körbe auswählen.</div>';
        return;
      }

      const gameMinutes = Math.max(1, gameMinutesInput);
      const switchMinutes = Math.max(0, switchMinutesInput);
      const checkinMinutes = Math.max(0, checkinMinutesInput);
      const breakMinutes = Math.max(0, breakMinutesInput);

      if (!startTime || !endTime) {
        status.innerHTML = '<div class="error">Bitte Startzeit und Endzeit eingeben.</div>';
        return;
      }

      const teams = teamNames(n);
      const baseRounds = roundRobin(teams);
      const schedule = [];

      let currentTime = startTime;
      let roundNo = 1;

      schedule.push({
        Typ: 'Info',
        Runde: '',
        Zeit: currentTime,
        Korb: '',
        Spiel: `Check-In, Begrüßung, Einteilung, warmup (${checkinMinutes} Min.)`
      });
      currentTime = addMinutes(currentTime, checkinMinutes);

      while (!timeGte(currentTime, endTime)) {
        for (const pairs of baseRounds) {
          if (timeGte(currentTime, endTime)) break;

          for (let i = 0; i < pairs.length; i++) {
            const p = pairs[i];
            schedule.push({
              Typ: 'Spiel',
              Runde: roundNo,
              Zeit: currentTime,
              Korb: i + 1,
              Spiel: p[0] + ' - ' + p[1]
            });
          }

          currentTime = addMinutes(currentTime, gameMinutes);
          if (timeGte(currentTime, endTime)) break;

          schedule.push({
            Typ: 'Wechselzeit',
            Runde: '',
            Zeit: currentTime,
            Korb: '',
            Spiel: `Wechselzeit (${switchMinutes} Min.)`
          });
          currentTime = addMinutes(currentTime, switchMinutes);
          if (timeGte(currentTime, endTime)) break;

          roundNo++;
        }

        if (!timeGte(currentTime, endTime)) {
          schedule.push({
            Typ: 'Pause',
            Runde: '',
            Zeit: currentTime,
            Korb: '',
            Spiel: `Pause (${breakMinutes} Min.)`
          });
          currentTime = addMinutes(currentTime, breakMinutes);
        }

        if (!timeGte(currentTime, endTime)) {
          roundNo++;
        }

        if (schedule.length > 2000) {
          status.innerHTML = '<div class="error">Spielplan zu lang (Abbruch nach 2000 Einträgen).</div>';
          break;
        }
      }

      schedule.push({
        Typ: 'Verabschiedung',
        Runde: '',
        Zeit: currentTime,
        Korb: '',
        Spiel: 'Verabschiedung / Ende des Turniers'
      });

      lastSchedule = schedule;

      const rows = schedule.map(s => {
        const korb = s.Korb || '';
        const typ = s.Typ;
        const runde = s.Runde;
        const zeit = s.Zeit;
        const spiel = s.Spiel;
        return `<tr>
          <td>${typ}</td>
          <td>${runde}</td>
          <td>${zeit}</td>
          <td>${korb}</td>
          <td>${spiel}</td>
        </tr>`;
      }).join('');

      tableWrap.innerHTML = `<table>
        <thead>
          <tr>
            <th>Typ</th>
            <th>Runde</th>
            <th>Zeit</th>
            <th>Korb</th>
            <th>Eintrag</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

      const txtLines = lastSchedule.map(s => {
        if (s.Typ === 'Spiel') {
          return `R${s.Runde} ${s.Zeit} Korb ${s.Korb}: ${s.Spiel}`;
        } else {
          return `${s.Zeit}: ${s.Spiel}`;
        }
      }).join('\n');

      textWrap.innerHTML = `<h3>Textformat</h3><pre>${txtLines}</pre>`;

      summary.innerHTML = `<div class="ok">
        Plan erstellt. Start ${startTime}, Ende ${endTime}, 
        Check-In, Pausen und Verabschiedung sind enthalten.
      </div>`;
      status.innerHTML = '';
    }

    function printPlan() {
      window.print();
    }

    async function copyTxt() {
      if (!lastSchedule.length) {
        buildSchedule();
      }
      if (!lastSchedule.length) {
        return;
      }
      const txtLines = lastSchedule.map(s => {
        if (s.Typ === 'Spiel') {
          return `R${s.Runde} ${s.Zeit} Korb ${s.Korb}: ${s.Spiel}`;
        } else {
          return `${s.Zeit}: ${s.Spiel}`;
        }
      }).join('\n');

      try {
        await navigator.clipboard.writeText(txtLines);
        document.getElementById('status').innerHTML = '<div class="ok">Text in die Zwischenablage kopiert.</div>';
      } catch (err) {
        document.getElementById('status').innerHTML =
          '<div class="error">Text konnte nicht in die Zwischenablage kopiert werden (Browser‑Einstellung).</div>';
      }
    }

    document.getElementById('generateBtn').addEventListener('click', buildSchedule);
    document.getElementById('copyTxtBtn').addEventListener('click', copyTxt);
    document.getElementById('printBtn').addEventListener('click', printPlan);

    buildSchedule();
  </script>
</body>
</html>
