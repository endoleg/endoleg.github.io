<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Basketball Campplaner Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #f4f7f6; }
        .config { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ccc; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #0056b3; color: white; }
        input { width: 90%; padding: 5px; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin: 2px; }
        .add-btn { background: #28a745; color: white; }
        .print-btn { background: #17a2b8; color: white; }
        .del-btn { background: #dc3545; color: white; }
        .move-btn { background: #eee; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Basketball Campplaner</h1>
    
    <div class="config">
        <label><b>Camp Startzeit: </b></label>
        <input type="time" id="campStart" value="09:30" onchange="recalcAll()">
    </div>

    <table id="planTable">
        <thead><tr><th>Dauer (Min)</th><th>Aktivität</th><th>Start</th><th>Ende</th><th>Verschieben</th><th>Aktion</th></tr></thead>
        <tbody>
            <tr><td><input type="number" value="15" onchange="recalcAll()"></td><td><input type="text" value="Check-in / Umziehen etc."></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="10" onchange="recalcAll()"></td><td><input type="text" value="Begrüßung & Warmup"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="5" onchange="recalcAll()"></td><td><input type="text" value="Einteilung Gruppen"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="38" onchange="recalcAll()"></td><td><input type="text" value="1. Stationsrunde Themen 1 & 2"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="5" onchange="recalcAll()"></td><td><input type="text" value="Pause"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="38" onchange="recalcAll()"></td><td><input type="text" value="1. Stationsrunde Themen 3 & 4"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="5" onchange="recalcAll()"></td><td><input type="text" value="Pause"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="38" onchange="recalcAll()"></td><td><input type="text" value="2. Stationsrunde Themen 1 & 2"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="5" onchange="recalcAll()"></td><td><input type="text" value="Pause"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="38" onchange="recalcAll()"></td><td><input type="text" value="2. Stationsrunde Themen 3 & 4"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="15" onchange="recalcAll()"></td><td><input type="text" value="Große Pause"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="80" onchange="recalcAll()"></td><td><input type="text" value="Spiele"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
            <tr><td><input type="number" value="5" onchange="recalcAll()"></td><td><input type="text" value="Ende"></td><td class="start"></td><td class="end"></td><td></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td></tr>
        </tbody>
    </table>

    <button class="btn add-btn" onclick="addRow()">+ Zeile hinzufügen</button>
    <button class="btn print-btn" onclick="window.print()">Plan Drucken</button>

    <script>
        function recalcAll() {
            let currentTime = document.getElementById('campStart').value;
            let rows = document.querySelectorAll('#planTable tbody tr');
            let [h, m] = currentTime.split(':').map(Number);
            let totalMinutes = h * 60 + m;
            rows.forEach(row => {
                let duration = parseInt(row.cells[0].querySelector('input').value) || 0;
                row.cells[2].innerText = formatTime(totalMinutes);
                totalMinutes += duration;
                row.cells[3].innerText = formatTime(totalMinutes);
            });
        }
        function formatTime(min) {
            let h = Math.floor(min / 60) % 24;
            let m = min % 60;
            return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
        }
        function moveRow(btn, direction) {
            let row = btn.parentElement.parentElement;
            let sibling = direction === -1 ? row.previousElementSibling : row.nextElementSibling;
            if (sibling) {
                direction === -1 ? row.parentNode.insertBefore(row, sibling) : row.parentNode.insertBefore(sibling, row);
                recalcAll();
            }
        }
        function addRow() {
            let tbody = document.querySelector('#planTable tbody');
            let row = tbody.insertRow();
            row.innerHTML = `<td><input type="number" value="15" onchange="recalcAll()"></td><td><input type="text"></td><td class="start"></td><td class="end"></td>
                             <td><button class="move-btn" onclick="moveRow(this, -1)">▲</button><button class="move-btn" onclick="moveRow(this, 1)">▼</button></td>
                             <td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); recalcAll();">X</button></td>`;
            updateMoveButtons();
            recalcAll();
        }
        function updateMoveButtons() {
            document.querySelectorAll('#planTable tbody tr').forEach(row => {
                let cell = row.cells[4];
                cell.innerHTML = `<button class="move-btn" onclick="moveRow(this, -1)">▲</button><button class="move-btn" onclick="moveRow(this, 1)">▼</button>`;
            });
        }
        updateMoveButtons();
        recalcAll();
    </script>
</body>
</html>
