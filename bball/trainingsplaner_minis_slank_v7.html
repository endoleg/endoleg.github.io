<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trainingsplaner Minis</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#102027;--muted:#607d8b;--line:#d9e2ec;--accent:#1565c0;--warn:#fff8e1}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1400px;margin:0 auto;padding:20px} h1{margin:0 0 8px;font-size:24px} .sub{color:var(--muted);margin-bottom:16px;line-height:1.45}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px} .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)} .full{grid-column:1/-1}
label{display:block;font-weight:700;margin:10px 0 6px} select,input,textarea,button{width:100%;font:inherit;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--text)} textarea{min-height:88px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px} .btnrow{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px} button{width:auto;cursor:pointer;border:none;background:var(--accent);color:#fff;font-weight:700} button.light{background:#90a4ae}
table{width:100%;border-collapse:collapse;margin-top:10px;table-layout:fixed} th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top;word-wrap:break-word;overflow-wrap:anywhere} th{background:#f8fafc}
.small{font-size:13px;color:var(--muted)}
@media print{.no-print{display:none !important}}
</style>
</head>
<body>
<div class="wrap">
  <h1>Trainingsplaner Minis</h1>
  <div class="sub">Schlanker Trainingsgerüst-Planer für U8 / U10 / U12: Blöcke nur bei Bedarf hinzufügen.</div>

  <div class="grid">
    <div class="card no-print">
      <div class="row">
        <div>
          <label for="ageGroup">Altersgruppe</label>
          <select id="ageGroup"><option value="U12">U12</option><option value="U10">U10</option><option value="U8">U8</option></select>
        </div>
        <div>
          <label for="duration">Dauer</label>
          <select id="duration"><option value="60">60 Minuten</option><option value="90" selected>90 Minuten</option><option value="120">120 Minuten</option></select>
        </div>
      </div>
      <label for="startTime">Trainingsbeginn</label>
      <input id="startTime" type="time" value="16:30" />
      <label for="dailyGoal" style="margin-top:12px">Trainingsziel des Tages</label>
      <input id="dailyGoal" type="text" placeholder="z. B. Freilaufen und Pass-Fang-Spiel" />
      <div class="btnrow">
        <button id="saveTemplate">Gerüst zurücksetzen</button>
        <button class="light" id="printPlan">Drucken</button>
      </div>
    </div>

    <div class="card">
      <div id="dailyGoalInfo" class="small" style="margin-top:6px"></div>
    </div>

    <div class="card full no-print">
      <h2 style="margin:0 0 8px">Trainingsgerüst</h2>
      <div class="small">Starte leer oder mit 2 festen Basisblöcken. Weitere Blöcke werden nur per Button ergänzt.</div>
      <div class="btnrow" style="margin-top:12px">
        <select id="addKind" style="min-width:260px;max-width:360px">
          <option value="technik:Ballhandling">Technik – Ballhandling</option>
          <option value="technik:Passen und Fangen">Technik – Passen und Fangen</option>
          <option value="technik:Beinarbeit">Technik – Beinarbeit</option>
          <option value="technik:Wurf/Korbabschluss">Technik – Wurf/Korbabschluss</option>
          <option value="spiel:1-1">Spiel – 1-1</option>
          <option value="spiel:2-2">Spiel – 2-2</option>
          <option value="spiel:3-3">Spiel – 3-3</option>
          <option value="spiel:4-4">Spiel – 4-4</option>
          <option value="spiel:Große Spiele">Spiel – Große Spiele</option>
          <option value="spiel:Kleine Spiele">Spiel – Kleine Spiele</option>
          <option value="spiel:Funino">Spiel – Funino</option>
          <option value="spiel:Parteiball">Spiel – Parteiball</option>
          <option value="spiel:Tigerball">Spiel – Tigerball</option>
          <option value="spiel:Dribbelkönig">Spiel – Dribbelkönig</option>
          <option value="spiel:Dribbelspiel">Spiel – Dribbelspiel</option>
          <option value="spiel:Bump">Spiel – Bump / Ausbomben</option>
          <option value="spiel:Balldieb">Spiel – Balldieb</option>
          <option value="spiel:Verkehrsspiel">Spiel – Verkehrsspiel / Autobahnspiel</option>
          <option value="spiel:Kettenfangen">Spiel – Kettenfangen</option>
          <option value="spiel:Ochs am Berg">Spiel – 1,2,3 Ochs am Berg</option>
          <option value="spiel:Balltausch">Spiel – Balltausch</option>
          <option value="athletik:Koordination">Athletik – Koordination</option>
          <option value="athletik:Warm-up">Athletik – Warm-up</option>
          <option value="athletik:Schnelligkeit">Athletik – Schnelligkeit</option>
          <option value="athletik:Balance">Athletik – Balance</option>
          <option value="divers:DIVERS">DIVERS</option>
        </select>
        <button id="addBlock">Block hinzufügen</button>
        <button class="light" id="addDIVERS">DIVERS hinzufügen</button>
      </div>
      <table>
        <thead><tr><th style="width:15%">Block</th><th style="width:10%">Uhrzeit</th><th style="width:10%">Dauer</th><th>Ziel / Coaching-Punkte</th><th style="width:22%">Auswahl</th></tr></thead>
        <tbody id="planBody"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
const pool={technik:["Ballhandling","Passen und Fangen","Beinarbeit","Wurf/Korbabschluss"],spiel:["1-1","2-2","3-3","4-4","Große Spiele","Kleine Spiele","Funino","Parteiball","Tigerball","Dribbelkönig","Dribbelspiel","Bump / Ausbomben","Balldieb","Verkehrsspiel / Autobahnspiel","Kettenfangen","1,2,3 Ochs am Berg","Balltausch"],athletik:["Koordination","Warm-up","Schnelligkeit","Balance"],divers:["DIVERS"],abschluss:["Abschluss"]};
const defaults={technik:10,spiel:14,athletik:8,divers:5,abschluss:3};
let rows=[];
const el=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
function addMinutes(t,m){const [h,mi]=String(t||'00:00').split(':').map(Number);const d=new Date();d.setHours(h||0,mi||0,0,0);d.setMinutes(d.getMinutes()+m);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function appendFinal(){const body=el('planBody');const tr=document.createElement('tr');tr.dataset.final='1';tr.innerHTML=`<td><strong>Abschluss</strong></td><td class="time"></td><td><input type="number" min="3" step="1" value="3" style="width:100%"></td><td><textarea placeholder="Ziel / Coaching-Punkte"></textarea></td><td><select class="choice"><option value="">Bitte wählen</option><option value="Abschluss">Abschluss</option></select></td>`;body.appendChild(tr)}
function rebuild(){const body=el('planBody');body.innerHTML='';rows.forEach(r=>{const opts=Object.keys(pool).flatMap(k=>pool[k]).map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('');const tr=document.createElement('tr');tr.dataset.kind=r.kind||'';tr.innerHTML=`<td><strong>${esc(r.block)}</strong></td><td class="time"></td><td><input type="number" min="0" step="1" value="${r.min}" style="width:100%"></td><td><textarea placeholder="Ziel / Coaching-Punkte"></textarea></td><td><select class="choice"><option value="">Bitte wählen</option>${opts}</select><div style="margin-top:8px"><button type="button" class="light removeBlock" style="width:100%">Block entfernen</button></div></td>`;body.appendChild(tr)});appendFinal();calc()}
function calc(){const start=el('startTime').value||'16:30';const dur=parseInt(el('duration').value,10)||90;let cursor=start;const trs=Array.from(el('planBody').querySelectorAll('tr'));trs.filter(tr=>!tr.dataset.final).forEach(tr=>{const inp=tr.querySelector('input');const mins=Math.max(0,parseInt(inp.value||'0',10)||0);tr.querySelector('.time').textContent=cursor;cursor=addMinutes(cursor,mins)});const fin=trs.find(tr=>tr.dataset.final);if(fin){fin.querySelector('.time').textContent=addMinutes(start,dur-3);const inp=fin.querySelector('input');if(inp) inp.value=3;}el('dailyGoalInfo').textContent=el('dailyGoal').value ? `Trainingsziel des Tages: ${el('dailyGoal').value}` : ''}
function addBlock(spec='technik:Block'){const [kind,label]=String(spec).split(':');const name=label||(pool[kind]&&pool[kind][0])||'Block';rows.push({block:name,min:defaults[kind]||10,kind});rebuild()}
function addDivers(){rows.push({block:'DIVERS',min:defaults.divers,kind:'divers'});rebuild()}
function reset(){rows=[{block:'Warm-up',min:12,kind:'athletik'},{block:'Technik',min:20,kind:'technik'}];rebuild()}
el('addBlock').onclick=()=>addBlock(el('addKind').value||'technik:Block');
el('addDIVERS').onclick=()=>addDivers();
el('saveTemplate').onclick=()=>reset();
el('printPlan').onclick=()=>window.print();
el('dailyGoal').addEventListener('input',calc);
el('duration').addEventListener('change',calc);
el('startTime').addEventListener('change',calc);
el('planBody').addEventListener('click',e=>{const btn=e.target.closest('.removeBlock');if(!btn)return;const tr=btn.closest('tr');if(tr&&!tr.dataset.final){const idx=Array.from(el('planBody').querySelectorAll('tr')).filter(x=>!x.dataset.final).indexOf(tr);tr.remove();if(idx>=0) rows.splice(idx,1);calc()}});
el('planBody').addEventListener('input',e=>{if(e.target.matches('input')) calc()});
el('planBody').addEventListener('change',e=>{const sel=e.target.closest('select.choice');if(!sel)return;const tr=sel.closest('tr');if(!tr||tr.dataset.final) return;const val=String(sel.value||'');let kind='technik';if(['1-1','2-2','3-3','4-4'].includes(val)) kind='spiel';else if(val==='DIVERS') kind='divers';else if(['Koordination','Warm-up','Schnelligkeit','Balance'].includes(val)) kind='athletik';else if(['Ballhandling','Passen und Fangen','Beinarbeit','Wurf/Korbabschluss'].includes(val)) kind='technik';const inp=tr.querySelector('input');if(inp) inp.value=defaults[kind]||10;calc()});
reset();
</script>
</body>
</html>
