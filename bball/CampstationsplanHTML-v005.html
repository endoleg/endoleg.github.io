<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Basketball Camp Stations-Filter</title>
  <style>
    :root{--bg:#0f172a;--panel:#111827;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--accent:#f59e0b;--accent2:#0f766e;--shadow:0 18px 40px rgba(0,0,0,.25);--radius:18px}
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:radial-gradient(circle at top,#1e293b 0%,var(--bg) 55%,#020617 100%);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    button,select,textarea{font:inherit}
    .app{max-width:1180px;margin:0 auto;padding:12px 12px 84px}
    .hero{padding:14px 16px;background:rgba(17,24,39,.9);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:12px}
    h1{margin:0;font-size:clamp(1.35rem,5vw,2.2rem);line-height:1.1}
    .subtitle{margin:8px 0 0;color:var(--muted);line-height:1.45;font-size:.92rem;max-width:72ch}
    .grid{display:grid;grid-template-columns:320px minmax(0,1fr);gap:12px;align-items:start}
    .card{background:rgba(17,24,39,.92);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .cardHeader{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);font-weight:700}
    .cardBody{padding:14px}
    label{display:block;margin:0 0 8px;color:#cbd5e1;font-weight:600;font-size:.95rem}
    select,textarea,button{width:100%;border-radius:12px;border:1px solid var(--line);background:#0b1220;color:var(--text);padding:11px 12px;outline:none;font-size:15px}
    textarea{min-height:78px;resize:vertical}
    select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.18)}
    .field{margin-bottom:12px}
    .buttonRow{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
    button{cursor:pointer;font-weight:700;transition:transform .15s ease,filter .15s ease}
    button:hover{transform:translateY(-1px)}
    .primary{background:linear-gradient(135deg,var(--accent),#fb7185);color:#111827;border-color:transparent}
    .secondary{background:#162033}
    .printBtn{background:var(--accent2);border-color:transparent}
    .sessionTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap}
    .sessionInfo{color:var(--muted);font-size:.94rem;line-height:1.45}
    .tagRow{display:flex;flex-wrap:wrap;gap:7px}
    .tag{display:inline-flex;align-items:center;padding:5px 9px;border-radius:999px;background:rgba(148,163,184,.12);color:#dbeafe;font-size:.78rem;border:1px solid rgba(255,255,255,.06)}
    .stationGrid{display:grid;grid-template-columns:1fr;gap:14px}
    .station{border:1px solid rgba(255,255,255,.08);border-radius:16px;background:#0b1220;overflow:hidden}
    .stationHead{padding:11px 12px;background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(34,197,94,.10));border-bottom:1px solid rgba(255,255,255,.06)}
    .stationTitle{margin:0;font-size:1.01rem;line-height:1.25}
    .stationMeta{margin-top:5px;color:var(--muted);font-size:.88rem;line-height:1.35}
    .stationBody{padding:11px;display:grid;gap:9px}
    .phaseBox{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
    .phaseHeader{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:8px}
    .phaseTitle{font-weight:700}
    .phaseCount{font-size:.82rem;color:var(--muted)}
    .phaseList{margin:0;padding-left:18px;color:#dbeafe;line-height:1.55}
    .phaseList li{margin:3px 0}
    .tabRow{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .tabBtn{width:auto;padding:10px 12px;border-radius:999px;background:#162033;border:1px solid var(--line);font-size:15px}
    .tabBtn.active{background:linear-gradient(135deg,var(--accent),#fb7185);color:#111827;border-color:transparent}
    .mobileOnly{display:none}
    @media (max-width:980px){.grid{grid-template-columns:1fr}.app{padding:10px}.buttonRow{grid-template-columns:1fr}.sessionTop{flex-direction:column;align-items:stretch}}
    @media (max-width:700px){.hero{padding:14px}.cardBody{padding:12px}.cardHeader{padding:11px 12px}.desktopTabs{display:none}.mobileOnly{display:block}.tabRow{display:grid;grid-template-columns:1fr 1fr;gap:7px}.tabBtn{width:100%;font-size:14px}.tag{font-size:.76rem;padding:5px 8px}select,textarea,button{font-size:16px;padding:11px}.stationBody{padding:11px}.stationHead{padding:11px}}
    @media (max-width:430px){.app{padding:8px}.subtitle{font-size:.88rem}.tabRow{grid-template-columns:1fr}.buttonRow{gap:6px}}
    @media print{@page{size:A4 portrait;margin:10mm}*{-webkit-print-color-adjust:exact;print-color-adjust:exact}body{background:#fff;color:#111827}.app{max-width:none;padding:0}.hero{display:block;margin:0 0 6mm 0;padding:0;background:#fff;border:0;box-shadow:none}.hero h1{font-size:20pt;margin-bottom:1.5mm}.subtitle{font-size:9.5pt;color:#374151;max-width:none}.grid{display:block}.card{box-shadow:none;background:#fff;color:#111827;border:1px solid #cbd5e1}.card:first-child{display:none !important}.cardHeader{background:#f8fafc;color:#111827;border-bottom:1px solid #cbd5e1;font-size:11pt}.cardBody{padding:0}.sessionTop{display:block;padding:6mm 6mm 3mm 6mm;margin:0;border-bottom:1px solid #e5e7eb}.sessionInfo{color:#374151;font-size:9pt}.tagRow{margin-top:3mm}.tag{background:#f3f4f6;color:#111827;border:1px solid #d1d5db;font-size:8.5pt}.stationGrid{display:block}.station{margin:4mm 6mm 6mm 6mm;border:1px solid #cbd5e1;border-radius:10px;background:#fff;break-inside:avoid}.stationHead{background:#fff;border-bottom:1px solid #e5e7eb;padding:6mm 6mm 4mm 6mm}.stationTitle{font-size:12.5pt}.stationMeta{color:#374151;font-size:9pt}.stationBody{padding:4mm 6mm 6mm 6mm;color:#111827}.phaseBox{padding:8px 10px;border-radius:10px}.buttonRow,.desktopTabs,.mobileOnly,select,textarea,button{display:none !important}}
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>Basketball Camp Stations-Filter</h1>
      <p class="subtitle">Wähle deine Station und die Phasen der Station. Du kannst auch alle oder mehrere Phasen in den Trainingsplan übernehmen und eigene Notizen eintragen.</p>
    </section>

    <div class="grid">
      <section class="card">
        <div class="cardHeader">Einstellungen</div>
        <div class="cardBody">
          <div class="field">
            <label for="stationFilter">Station auswählen</label>
            <div class="tabRow desktopTabs" id="stationTabs">
              <button class="tabBtn active" data-station="offensive" type="button">Offensive</button>
              <button class="tabBtn" data-station="defense" type="button">Verteidigung</button>
              <button class="tabBtn" data-station="ballhandling" type="button">Ballhandling</button>
              <button class="tabBtn" data-station="scoring" type="button">Scoring</button>
              <button class="tabBtn" data-station="motion" type="button">Motion</button>
            </div>
            <select id="stationFilter" class="mobileOnly" style="margin-top:10px">
              <option value="offensive">1. Offensive Beinarbeit & Täuschungen</option>
              <option value="defense">2. Verteidigung</option>
              <option value="ballhandling">3. Ballhandling</option>
              <option value="scoring">4. Scoring</option>
              <option value="motion">5. Motion</option>
            </select>
          </div>

          <div class="field">
            <label for="phases">Phasen übernehmen</label>
            <select id="phases" multiple size="5">
              <option value="phase1" selected>Phase 1</option>
              <option value="phase2" selected>Phase 2</option>
              <option value="phase3">Phase 3</option>
              <option value="phase4">Phase 4</option>
              <option value="phase5">Phase 5</option>
            </select>
          </div>

          <div class="field">
            <label for="coachNote">Coach-Notiz</label>
            <textarea id="coachNote" placeholder="z. B. Kleine Gruppe, schnelle Erklärung, viele Wiederholungen..."></textarea>
          </div>

          <div class="buttonRow">
            <button class="primary" id="generateBtn" type="button">Notiz in Plan übertragen</button>
            <button class="secondary" id="resetBtn" type="button">Zurücksetzen</button>
            <button class="printBtn" id="printBtn" type="button">Drucken</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="cardHeader">Anzeige</div>
        <div class="cardBody" id="printArea">
          <div class="sessionTop">
            <div>
              <strong id="planTitle">Station auswählen</strong>
              <div class="sessionInfo" id="planInfo">Wähle links eine Station aus.</div>
            </div>
            <div class="tagRow" id="summaryTags"></div>
          </div>
          <div class="stationGrid" id="stationGrid"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const stationData={offensive:{title:"1. Offensive Beinarbeit & Täuschungen",meta:"Stoppen, Sternschritt, Finten, Cuts",tags:["Grundstellung","Sprungstopp","Schrittstopp","Sternschritt","Täuschungen"],phases:{phase1:[{title:"Sprungstopp auf Linien",desc:"Laufend stoppen und stabil landen. Ziel ist ein sauberer, balancierter 1-Kontakt-Stopp."},{title:"Sternschritt ohne Ball",desc:"Aus dem Stand vorwärts und rückwärts drehen, ohne das Standbein zu verlassen."},{title:"Fang- und Drehübung",desc:"Pass aufnehmen, aufrichten und direkt in eine sichere Drehbewegung gehen."}],phase2:[{title:"Stopp & Go",desc:"Nach dem Stop sofort wieder anlaufen, um Tempowechsel zu schulen."},{title:"Sternschritt mit Pass",desc:"Nach dem Abstoppen den Ball schützen und aus dem Sternschritt weiterspielen."},{title:"Wurftäuschung vor dem Korb",desc:"Kurze Finte vorm Abschluss, danach sofort zum Korb ziehen."}],phase3:[{title:"Stop-and-Go mit Sternschritt",desc:"Aus dem Dribbling stoppen, schützen, drehen und explosiv weitergehen."},{title:"Front- und Backdoor-Entscheidungen",desc:"Den Verteidiger lesen und je nach Position vorne oder hinten absetzen."},{title:"Täuschung nach Pass",desc:"Pass antäuschen, Verteidiger binden und mit dem ersten Schritt Raum gewinnen."}],phase4:[{title:"Tempowechsel aus dem Dribbling",desc:"Mit Rhythmuswechsel ausgebremst und wieder explosiv beschleunigen."},{title:"Sternschritt unter Druck",desc:"Sternschritt trotz Gegnerdruck sauber und stabil ausführen."},{title:"1-gegen-1 mit Cut-Entscheidung",desc:"Nach kurzer Täuschung den passenden Cut wählen und beschleunigen."}],phase5:[{title:"Advanced Footwork",desc:"Komplexe Fußarbeit mit mehreren Richtungs- und Tempowechseln."},{title:"Shot-Fake in Spielnähe",desc:"Wurftäuschung glaubhaft einsetzen und die Reaktion des Verteidigers nutzen."},{title:"Decision Drill mit Verteidiger",desc:"Kombination aus Finte, erster Aktion und direkter Entscheidung gegen Defense."}]}},defense:{title:"2. Verteidigung",meta:"Grundstellung, Ballverteidigung, Help Defense",tags:["Closeout","Deny","Jump with the pass","Help","Rebound"],phases:{phase1:[{title:"Defense-Grundstellung",desc:"Tiefe Haltung mit aktivem Schwerpunkt und sauberer Balance."},{title:"Seitliche Slides",desc:"Ohne Kreuzen seitwärts gleiten und den Abstand kontrollieren."},{title:"Ball spiegeln ohne Kontakt",desc:"Die Ballbewegung mit den Händen nachzeichnen, ohne zu foulen."}],phase2:[{title:"Closeout zur Linie",desc:"Kontrolliert an den Ballführenden heranlaufen und rechtzeitig abbremsen."},{title:"1-gegen-1 auf dem Flügel",desc:"Ballhandler auf dem Flügel ohne Hilfe verteidigen."},{title:"Rebound und Boxout",desc:"Nach dem Wurf Kontakt aufnehmen, ausboxen und sichern."}],phase3:[{title:"Deny und Hilfe",desc:"Passweg zum Mitspieler schließen und den Ball führenden Spieler lenken."},{title:"Closeout + Slide",desc:"Aus dem Closeout sofort in stabile Seitwärtsbewegung wechseln."},{title:"Shell-Drill vereinfacht",desc:"Grundprinzipien von Hilfe, Rotation und Passwegverteidigung trainieren."}],phase4:[{title:"Ball- und Help-Defense",desc:"Ball sehen, Mann sehen und bei Bedarf rechtzeitig helfen."},{title:"Closeout unter Kontrolle",desc:"Mit kurzen Schritten den Schützen aufnehmen, ohne zu springen."},{title:"1-gegen-1 mit Recovery",desc:"Nach einer Richtungsänderung schnell wieder in Verteidigung kommen."}],phase5:[{title:"Shell-Drill intensiv",desc:"Mehrere defensive Entscheidungen in einer kompakten Spielform."},{title:"Closeout in Wettkampfform",desc:"Wurfdruck erzeugen und danach wieder in Position kommen."},{title:"Defensivrebound unter Kontakt",desc:"Den Rebound trotz Körperkontakt sichern und anschließenden Outlet einleiten."}]}},ballhandling:{title:"3. Ballhandling",meta:"Dribbling, Handwechsel, Passen & Fangen",tags:["Cross-over","Behind the back","Between the legs","Pass & Catch"],phases:{phase1:[{title:"Dribbling rechts/links",desc:"Sicheres Dribbling mit beiden Händen im Stand und in Bewegung."},{title:"Stop-and-go",desc:"Tempoläufe mit sauberem Stopp und erneuter Beschleunigung."},{title:"Passen an die Wand",desc:"Boden- oder Brustpass gegen die Wand und sauber wieder fangen."}],phase2:[{title:"Slalomdribbling",desc:"Mit Hütchen oder Linien den Ball kontrolliert durch einen Parcours führen."},{title:"Handwechsel im Stand",desc:"Crossover ruhig auf der Stelle, mit tiefem Ball und Schutzhand."},{title:"Passen in Paaren",desc:"Sauberes Anspiel, Blickkontakt und Fangtechnik in einfacher Form."}],phase3:[{title:"Cross-over + Richtungswechsel",desc:"Handwechsel direkt mit einem explosiven Richtungswechsel verbinden."},{title:"2-Ball-Dribbling",desc:"Beidseitige Koordination und Rhythmus mit zwei Bällen aufbauen."},{title:"Pass-Fang in Bewegung",desc:"Passen und direkt in die nächste Bewegung übergehen."}],phase4:[{title:"Handwechsel unter Druck",desc:"Dribbling trotz Gegnernähe kontrolliert und tief halten."},{title:"Dribble-Kombinationen",desc:"Cross-over, Behind the Back und Between the Legs variieren."},{title:"Passvarianten aus dem Lauf",desc:"Aus der Bewegung verschiedene Pässe sicher anbringen."}],phase5:[{title:"Advanced Ballhandling",desc:"Komplexe Ballkontrolle mit Tempo und Raumdruck."},{title:"Decision Dribble",desc:"Nach der Täuschung die richtige Dribbling-Entscheidung treffen."},{title:"1-gegen-1 mit Combo-Moves",desc:"Mit Handwechseln eine echte 1-gegen-1-Situation lösen."}]}},scoring:{title:"4. Scoring",meta:"Korbleger, Wurf, Floater, Abschlussformen",tags:["Layup","Floater","Eurostep","Wurf","Power Move"],phases:{phase1:[{title:"Beidseitige Korbleger",desc:"Linke und rechte Seite am Korb sicher abschließen."},{title:"Zielwurf nah am Korb",desc:"Aus kurzer Distanz auf Technik und Treffgenauigkeit achten."},{title:"Wettbewerb auf kurze Distanz",desc:"Leichte Wettkampfform mit vielen erfolgreichen Abschlüssen."}],phase2:[{title:"Korbleger rechts/links",desc:"Aus verschiedenen Anläufen beide Seiten trainieren."},{title:"Positionswurf nah am Ring",desc:"Standwurf aus guter Basisposition, sauber und ruhig."},{title:"Einfacher Floater",desc:"Kleiner Touch-Wurf über den Verteidiger oder imaginären Blocker."}],phase3:[{title:"Eurostep-Basics",desc:"Mit zwei Schritten am Gegner vorbeigehen und kontrolliert abschließen."},{title:"Wurf aus dem Stand",desc:"Sauberer Wurfmechanismus ohne Dribbling ausführen."},{title:"Abschluss nach Dribbling",desc:"Nach dem Penetrationsdribbling sicher zur Korbseite abschließen."}],phase4:[{title:"Floater & Power Move",desc:"Zwischen Nahdistanzwurf und Körperabschluss variieren."},{title:"Abschluss gegen Kontakt",desc:"Mit leichtem Gegenspielerdruck den Abschluss durchbringen."},{title:"Wurf aus Bewegung",desc:"Den Wurf nach Lauf oder Dribbling in ein flüssiges Timing bringen."}],phase5:[{title:"Finishing Package",desc:"Mehrere Abschlussarten flexibel in einer Serie verbinden."},{title:"Shot Creation",desc:"Den Abschluss nach eigener Aktion selbst vorbereiten."},{title:"Wurf unter Zeitdruck",desc:"Schnell entscheiden, sauber ausführen und danach sofort weiterarbeiten."}]}},motion:{title:"5. Motion",meta:"Pass, Cut, Fill, Freilaufen",tags:["Pass-Cut-Fill","Backdoor","Give and Go","Spacing","Read & React"],phases:{phase1:[{title:"Pass und laufen",desc:"Nach dem Pass direkt neue Positionen anlaufen."},{title:"Freilaufen auf Spots",desc:"Sich aktiv auf freie Positionen bewegen und anspielbar werden."},{title:"Give and Go ohne Druck",desc:"Pass geben und sofort wieder in den Raum starten."}],phase2:[{title:"Frontcut und Nachlaufen",desc:"Vor dem Verteidiger schneiden und auf den zweiten Pass vorbereitet sein."},{title:"Pass-Cut-Fill",desc:"Nach dem Pass cutten und die freie Position wieder auffüllen."},{title:"4-gegen-0 Bewegung",desc:"Grundstruktur ohne Defense mit sauberer Lauf- und Passlogik."}],phase3:[{title:"Backdoor-Entscheidung",desc:"Bei verweigertem Pass sofort hinter dem Verteidiger abschneiden."},{title:"4-out Grundform",desc:"Die vier Außenpositionen mit klaren Bewegungsregeln besetzen."},{title:"Cut and Fill mit Timing",desc:"Timing zwischen Cut und Auffüllen sauber abstimmen."}],phase4:[{title:"Dribble-at und Backdoor",desc:"Auf Dribble-Trigger reagieren und in die Tiefe schneiden."},{title:"Motion mit Regeln",desc:"Mit einfachen Regeln bessere Bewegungen und Entscheidungen erzeugen."},{title:"Spacing und Timing",desc:"Abstände halten und zur richtigen Zeit starten."}],phase5:[{title:"Read and React",desc:"Gegner und Raum lesen und passend reagieren."},{title:"4-out Motion",desc:"Eine dynamische, flächige Offense mit klaren Laufwegen."},{title:"Entscheidungsdrills mit Defense",desc:"Im realistischeren Setup auf Verteidiger und Passfenster reagieren."}]}}};
    const el=id=>document.getElementById(id);
    function getSelectedPhases(){return Array.from(el('phases').selectedOptions).map(o=>o.value)}
    function buildPlan(){const station=el('stationFilter').value,note=el('coachNote').value.trim(),s=stationData[station],selectedPhases=getSelectedPhases();const phaseBoxes=selectedPhases.map(p=>{const number=p.replace('phase','Phase '),items=s.phases[p]||[];return `<div class="phaseBox"><div class="phaseHeader"><div class="phaseTitle">${number}</div><div class="phaseCount">${items.length} Übungen</div></div>${items.map(item=>`<div style="margin-bottom:10px"><strong>${item.title}</strong><div class="sessionInfo">${item.desc}</div></div>`).join('')}</div>`}).join('');el('planTitle').textContent=s.title;el('planInfo').textContent=`${selectedPhases.length} Phase(n) ausgewählt`;el('summaryTags').innerHTML=[`<span class="tag">${selectedPhases.length} Phase(n)</span>`].join('');el('stationGrid').innerHTML=`<article class="station"><div class="stationHead"><h3 class="stationTitle">${s.title}</h3><div class="stationMeta">${s.meta}</div></div><div class="stationBody"><div class="tagRow">${s.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>${phaseBoxes}<div class="phaseBox"><div class="phaseHeader"><div class="phaseTitle">Coach-Hinweis</div><div class="phaseCount">Anpassung</div></div><div class="sessionInfo">${note||'Nutze die ausgewählten Phasen passend zur Gruppe und zum Tagesziel.'}</div></div></div></article>`;document.querySelectorAll('.tabBtn').forEach(b=>b.classList.toggle('active',b.dataset.station===station))}
    function resetForm(){el('stationFilter').value='offensive';const opts=el('phases').options;for(let i=0;i<opts.length;i++)opts[i].selected=i<2;el('coachNote').value='';buildPlan()}
    function printPlan(){window.print()}
    el('generateBtn').addEventListener('click',buildPlan);el('resetBtn').addEventListener('click',resetForm);el('printBtn').addEventListener('click',printPlan);['stationFilter','phases'].forEach(id=>el(id).addEventListener('change',buildPlan));document.querySelectorAll('.tabBtn').forEach(btn=>btn.addEventListener('click',()=>{el('stationFilter').value=btn.dataset.station;buildPlan()}));buildPlan();
  </script>
</body>
</html>
