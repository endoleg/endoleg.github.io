<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spielplangenerator Spielfest</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:1100px;margin:24px auto;padding:0 16px;color:#111}
    h1{margin-bottom:8px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:16px 0}
    label{display:block;font-weight:600;margin-bottom:6px}
    input,select,button{width:100%;box-sizing:border-box;font-size:16px;padding:10px;border:1px solid #bbb;border-radius:8px}
    button{cursor:pointer;background:#0b5fff;color:#fff;border:none;font-weight:700}
    button.secondary{background:#e9eef7;color:#111;border:1px solid #c9d5ea}
    table{border-collapse:collapse;width:100%;margin-top:18px}
    th,td{border:1px solid #ddd;padding:8px;text-align:left}
    th{background:#f5f7fb}
    .muted{color:#666;font-size:14px}
    .error{color:#b00020;font-weight:700;margin-top:10px}
    .ok{color:#0b6b2f;font-weight:700;margin-top:10px}
    .toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
    .toolbar button{width:auto;min-width:180px}
    pre{white-space:pre-wrap;background:#f7f7f7;border:1px solid #ddd;border-radius:8px;padding:12px;overflow:auto}
    .hint{background:#fff8d6;border:1px solid #ead37b;padding:10px;border-radius:8px;margin-top:10px}
  </style>
</head>
<body>
  <h1>Spielplangenerator Spielfest</h1>
  <p class="muted">Jeder gegen jeden. Teams werden automatisch als A, B, C ... bezeichnet.</p>
    <div class="grid">
    <div>
      <label for="teams">Anzahl Teams</label>
      <input id="teams" type="number" min="2" value="4" />
    </div>
    <div>
      <label for="courts">Anzahl Körbe gleichzeitig nutzbar</label>
      <select id="courts">
        <option value="2">2 Körbe</option>
        <option value="3">3 Körbe</option>
        <option value="4" selected>4 Körbe</option>
      </select>
    </div>
    <div>
      <label for="gameMinutes">Spieldauer pro Spiel (Minuten)</label>
      <input id="gameMinutes" type="number" min="1" value="7" />
    </div>
    <div>
      <label for="switchMinutes">Wechselzeit zwischen Spielen (Minuten)</label>
      <input id="switchMinutes" type="number" min="0" value="3" />
    </div>
    <div>
      <label for="startTime">Startzeit</label>
      <input id="startTime" type="time" value="09:45" />
    </div>
    <div>
      <label for="endTime">Endzeit Turnier</label>
      <input id="endTime" type="time" value="12:30" />
    </div>
    <div>
      <label for="checkinMinutes">Begrüßung / Check-In vor Start (Minuten)</label>
      <input id="checkinMinutes" type="number" min="0" value="30" />
    </div>
    <div>
      <label for="breakMinutes">Pause nach komplettem Durchlauf (Minuten)</label>
      <input id="breakMinutes" type="number" min="0" value="10" />
    </div>
  </div>

  <div class="toolbar">
    <button id="generateBtn">Spielplan erzeugen</button>
    <button class="secondary" id="downloadCsvBtn">CSV herunterladen</button>
    <button class="secondary" id="copyTxtBtn">Plan als Text kopieren</button>
  </div>

  <div id="status"></div>
  <div id="summary"></div>
  <div id="tableWrap"></div>
  <div id="textWrap"></div>

<script>
let lastSchedule = [];
function teamNames(n){const names=[];for(let i=0;i<n;i++) names.push(String.fromCharCode(65+i));return names;}
function roundRobin(teams){const arr=teams.slice();if(arr.length%2===1) arr.push('BYE');const n=arr.length, rounds=n-1, half=n/2, out=[];for(let r=0;r<rounds;r++){const pairs=[];for(let i=0;i<half;i++){const a=arr[i], b=arr[n-1-i];if(a!=='BYE'&&b!=='BYE') pairs.push([a,b]);}out.push(pairs);arr.splice(1,0,arr.pop());}return out;}
function pad(n){return String(n).padStart(2,'0');}
function addMinutes(timeStr, mins){const [h,m]=timeStr.split(':').map(Number);const d=new Date();d.setHours(h,m,0,0);d.setMinutes(d.getMinutes()+mins);return pad(d.getHours())+':'+pad(d.getMinutes());}
function buildSchedule(){
  const n=Number(document.getElementById('teams').value), courts=Number(document.getElementById('courts').value), gameMinutes=Number(document.getElementById('gameMinutes').value), switchMinutes=Number(document.getElementById('switchMinutes').value), startTime=document.getElementById('startTime').value, endTime=document.getElementById('endTime').value, checkinMinutes=Number(document.getElementById('checkinMinutes').value), breakMinutes=Number(document.getElementById('breakMinutes').value), status=document.getElementById('status'), summary=document.getElementById('summary'), tableWrap=document.getElementById('tableWrap'), textWrap=document.getElementById('textWrap');
  if(!Number.isInteger(n)||n<2){status.innerHTML='<div class="error">Bitte mindestens 2 Teams eingeben.</div>';return;}
  if(![2,3,4].includes(courts)){status.innerHTML='<div class="error">Bitte nur 2, 3 oder 4 Körbe auswählen.</div>';return;}
  if(!endTime){status.innerHTML='<div class="error">Bitte eine Endzeit eingeben.</div>';return;}
  const teams=teamNames(n), baseRounds=roundRobin(teams), schedule=[];
  let currentTime = startTime;
  schedule.push({Typ:'Info', Runde:'', Zeit:currentTime, Korb:'', Spiel:`Check-In, Begrüßung, Einteilung, warmup (${checkinMinutes} Min.)`});
  currentTime = addMinutes(currentTime, checkinMinutes);
  let roundNo = 1;
  while(currentTime < endTime){
    for(const pairs of baseRounds){
      for(let i=0;i<pairs.length;i++){
        const p=pairs[i];
        schedule.push({Typ:'Spiel', Runde:roundNo, Zeit:currentTime, Korb:i+1, Spiel:p[0]+' - '+p[1]});
      }
      currentTime = addMinutes(currentTime, gameMinutes);
      if(currentTime >= endTime) break;
      schedule.push({Typ:'Wechselzeit', Runde:'', Zeit:currentTime, Korb:'', Spiel:`Wechselzeit (${switchMinutes} Min.)`});
      currentTime = addMinutes(currentTime, switchMinutes);
      if(currentTime >= endTime) break;
      roundNo++;
    }
    if(currentTime < endTime){
      schedule.push({Typ:'Pause', Runde:'', Zeit:currentTime, Korb:'', Spiel:`Pause (${breakMinutes} Min.)`});
      currentTime = addMinutes(currentTime, breakMinutes);
    }
    if(currentTime < endTime){
      roundNo++;
    }
    if(schedule.length > 2000) break;
  }
  schedule.push({Typ:'Verabschiedung', Runde:'', Zeit:Math.min ? currentTime : currentTime, Korb:'', Spiel:'Verabschiedung / Ende des Turniers'});
  lastSchedule=schedule;
  const rows=schedule.map(s=>`<tr><td>${s.Typ}</td><td>${s.Runde}</td><td>${s.Zeit}</td><td>${s.Korb||''}</td><td>${s.Spiel}</td></tr>`).join('');
  tableWrap.innerHTML=`<table><thead><tr><th>Typ</th><th>Runde</th><th>Zeit</th><th>Korb</th><th>Eintrag</th></tr></thead><tbody>${rows}</tbody></table>`;
  textWrap.innerHTML=`<h3>Textformat</h3><pre>${schedule.map(s=>s.Typ==='Spiel' ? `R${s.Runde} ${s.Zeit} Korb ${s.Korb}: ${s.Spiel}` : `${s.Zeit}: ${s.Spiel}`).join('\n')}</pre>`;
  summary.innerHTML=`<div class="ok">Plan erstellt. Start ${startTime}, Ende ${endTime}, Check-In, Pausen und Verabschiedung sind enthalten.</div>`;
  status.innerHTML='';
}
function downloadCsv(){if(!lastSchedule.length){buildSchedule();} if(!lastSchedule.length) return; const header=['Typ','Runde','Zeit','Korb','Eintrag']; const csv=[header.join(',')].concat(lastSchedule.map(s=>[s.Typ,s.Runde,s.Zeit,s.Korb,'"'+s.Spiel+'"'].join(','))).join('\n'); const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='spielplan.csv'; a.click(); URL.revokeObjectURL(url);}
async function copyTxt(){if(!lastSchedule.length){buildSchedule();} if(!lastSchedule.length) return; const txt=lastSchedule.map(s=>s.Typ==='Spiel' ? `R${s.Runde} ${s.Zeit} Korb ${s.Korb}: ${s.Spiel}` : `${s.Zeit}: ${s.Spiel}`).join('\n'); await navigator.clipboard.writeText(txt); document.getElementById('status').innerHTML='<div class="ok">Text in die Zwischenablage kopiert.</div>';}
document.getElementById('generateBtn').addEventListener('click', buildSchedule); document.getElementById('downloadCsvBtn').addEventListener('click', downloadCsv); document.getElementById('copyTxtBtn').addEventListener('click', copyTxt); buildSchedule();
</script>
</body>
</html>
