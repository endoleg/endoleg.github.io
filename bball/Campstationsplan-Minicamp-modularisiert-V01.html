<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Basketball Camp Stations-Filter</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #f59e0b;
      --accent2: #10b981;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.25);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 55%, #020617 100%);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, select, textarea { font: inherit; }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 12px 12px 84px;
    }

    .hero {
      padding: 14px 16px;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 5vw, 2.2rem);
      line-height: 1.1;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.92rem;
      max-width: 72ch;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .cardHeader {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
      font-weight: 700;
    }

    .cardBody { padding: 14px; }

    label {
      display: block;
      margin: 0 0 8px;
      color: #cbd5e1;
      font-weight: 600;
      font-size: 0.95rem;
    }

    select, textarea, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      padding: 11px 12px;
      outline: none;
      font-size: 15px;
    }

    textarea {
      min-height: 78px;
      resize: vertical;
    }

    select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.18);
    }

    .field { margin-bottom: 12px; }

    .buttonRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    .primary {
      background: linear-gradient(135deg, var(--accent), #fb7185);
      color: #111827;
      border-color: transparent;
    }
    .secondary { background: #162033; }
    .printBtn {
      background: var(--accent2);
      border-color: transparent;
    }

    .sessionTop {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .sessionInfo {
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.45;
    }

    .tagRow {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.12);
      color: #dbeafe;
      font-size: 0.78rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .stationGrid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .station {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: #0b1220;
      overflow: hidden;
    }

    .stationHead {
      padding: 11px 12px;
      background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(34, 197, 94, 0.10));
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .stationTitle {
      margin: 0;
      font-size: 1.01rem;
      line-height: 1.25;
    }

    .stationMeta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .stationBody {
      padding: 11px;
      display: grid;
      gap: 9px;
    }

    .phaseBox {
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .phaseHeader {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .phaseTitle { font-weight: 700; }
    .phaseCount {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .phaseList {
      margin: 0;
      padding-left: 18px;
      color: #dbeafe;
      line-height: 1.55;
    }

    .phaseList li { margin: 3px 0; }

    .tabRow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .tabBtn {
      width: auto;
      padding: 10px 12px;
      border-radius: 999px;
      background: #162033;
      border: 1px solid var(--line);
      font-size: 15px;
    }

    .tabBtn.active {
      background: linear-gradient(135deg, var(--accent), #fb7185);
      color: #111827;
      border-color: transparent;
    }

    .mobileOnly { display: none; }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .app { padding: 10px; }
      .buttonRow { grid-template-columns: 1fr; }
      .sessionTop {
        flex-direction: column;
        align-items: stretch;
      }
    }

    @media (max-width: 700px) {
      .hero { padding: 14px; }
      .cardBody { padding: 12px; }
      .cardHeader { padding: 11px 12px; }
      .desktopTabs { display: none; }
      .mobileOnly { display: block; }
      .tabRow {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
      }
      .tabBtn {
        width: 100%;
        font-size: 14px;
      }
      .tag {
        font-size: 0.76rem;
        padding: 5px 8px;
      }
      select, textarea, button {
        font-size: 16px;
        padding: 11px;
      }
      .stationBody,
      .stationHead { padding: 11px; }
    }

    @media (max-width: 430px) {
      .app { padding: 8px; }
      .subtitle { font-size: 0.88rem; }
      .tabRow { grid-template-columns: 1fr; }
      .buttonRow { gap: 6px; }
    }

    @media print {
      @page {
        size: A4 portrait;
        margin: 8mm;
      }

      * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      html, body { height: auto !important; }
      body {
        background: #fff;
        color: #111827;
      }

      .app {
        max-width: none;
        padding: 0 !important;
      }

      .hero { display: none !important; }
      .grid {
        display: block !important;
        gap: 0 !important;
      }

      .card {
        box-shadow: none;
        background: #fff;
        color: #111827;
        border: 0 !important;
        overflow: visible !important;
      }

      .card:first-child { display: none !important; }
      .card:last-child { display: block !important; }
      .cardHeader { display: none !important; }
      .cardBody { padding: 0 !important; }

      .sessionTop {
        display: block;
        padding: 0 0 2mm 0;
        margin: 0 0 2mm 0;
        border: 0;
        border-bottom: 1px solid #e5e7eb;
      }

      .sessionInfo {
        color: #374151;
        font-size: 8.5pt;
        line-height: 1.2;
      }

      .tagRow {
        margin-top: 1.5mm;
        gap: 4px;
      }

      .tag {
        background: #f3f4f6;
        color: #111827;
        border: 1px solid #d1d5db;
        font-size: 7.5pt;
        padding: 3px 6px;
      }

      .stationGrid { display: block; }

      .station {
        margin: 0;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .stationHead {
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        padding: 3mm 3mm 2mm 3mm;
      }

      .stationTitle {
        font-size: 12pt;
        line-height: 1.1;
      }

      .stationMeta {
        color: #374151;
        font-size: 8.3pt;
        line-height: 1.1;
        margin-top: 1mm;
      }

      .stationBody {
        padding: 2.5mm 3mm 3mm 3mm;
        color: #111827;
        gap: 5px;
      }

      .phaseBox {
        padding: 4px 6px;
        border-radius: 8px;
        page-break-inside: avoid;
      }

      .phaseHeader { margin-bottom: 4px; }
      .phaseCount { font-size: 7.5pt; }
      .phaseTitle { font-size: 9pt; }
      .phaseBox strong {
        font-size: 8.8pt;
        line-height: 1.05;
      }
      .phaseBox .sessionInfo {
        font-size: 7.7pt;
        line-height: 1.1;
      }

      .buttonRow,
      .desktopTabs,
      .mobileOnly,
      select,
      textarea,
      button { display: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>Basketball Camp Stations-Filter</h1>
      <p class="subtitle">Wähle deine Station und die Phasen der Station.</p>
    </section>

    <div class="grid">
      <section class="card">
        <div class="cardHeader">Einstellungen</div>
        <div class="cardBody">
          <div class="field">
            <label for="stationFilter">Station auswählen</label>
            <div class="tabRow desktopTabs" id="stationTabs">
              <button class="tabBtn active" data-station="offensive" type="button">Offensive</button>
              <button class="tabBtn" data-station="defense" type="button">Verteidigung</button>
              <button class="tabBtn" data-station="ballhandling" type="button">Ballhandling</button>
              <button class="tabBtn" data-station="scoring" type="button">Scoring</button>
              <button class="tabBtn" data-station="motion" type="button">Motion</button>
              <button class="tabBtn" data-station="athletik" type="button">Athletik</button>
            </div>
            <select id="stationFilter" class="mobileOnly" style="margin-top:10px">
              <option value="offensive">1. Offensive</option>
              <option value="defense">2. Verteidigung</option>
              <option value="ballhandling">3. Ballhandling</option>
              <option value="scoring">4. Scoring</option>
              <option value="motion">5. Motion</option>
              <option value="athletik">6. Athletik</option>
            </select>
          </div>

          <div class="field">
            <label for="phases">Phasen übernehmen</label>
            <select id="phases" multiple size="7">
              <option value="phase1" selected>Phase 1</option>
              <option value="phase2" selected>Phase 2</option>
              <option value="phase3" selected>Phase 3</option>
              <option value="phase4" selected>Phase 4</option>
              <option value="phase5" selected>Phase 5</option>
              <option value="phase6" selected>Phase 6</option>
              <option value="phase7" selected>Phase 7</option>
            </select>
          </div>

          <div class="field">
            <label for="coachNote">Coach-Notiz</label>
            <textarea id="coachNote" placeholder="z. B. Fokus auf Intensität..."></textarea>
          </div>

          <div class="buttonRow">
            <button class="primary" id="generateBtn" type="button">Übertragen</button>
            <button class="secondary" id="resetBtn" type="button">Reset</button>
            <button class="printBtn" id="printBtn" type="button">Drucken</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="cardHeader">Anzeige</div>
        <div class="cardBody" id="printArea">
          <div class="sessionTop">
            <div>
              <strong id="planTitle">Station auswählen</strong>
              <div class="sessionInfo" id="planInfo">Wähle links eine Station aus.</div>
            </div>
            <div class="tagRow" id="summaryTags"></div>
          </div>
          <div class="stationGrid" id="stationGrid"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const StationRepository = (() => {
      const stationData = {
        offensive: {
          title: '1. Offensive Beinarbeit',
          meta: 'Stabilität, Stopptechnik, Startkoordination und Finte-Variationen',
          tags: ['Balance', 'Stoppen', 'Dribbelstart', 'Sternschritt', 'Finten', 'Cuts'],
          phases: {
            phase1: [{ title: 'Grundstellung & Balance', desc: 'Basketball-Grundstellung, Grundstellung Beine leicht gebeugt, Füße schulterbreit, Ball körpernah.' }],
            phase2: [{ title: 'Stoppen & Absprungtechnik', desc: 'Unterschied und Schulung 1-Kontakt-Sprungstopp vs. 2-Kontakt-Schrittstopp, aus dem Pass und aus dem Dribbling, Landetechnik.' }],
            phase3: [{ title: 'Dribbelstart & Ballschutz', desc: 'tiefer Ansatz, Kreuzschritt (gegengleiche Koordination), Passgang, Dribbel-Schritt-Koordination, Ballschutz/sweep.' }],
            phase4: [{ title: 'Beinarbeit & Sternschritt', desc: 'Sternschritt vorwärts/rückwärts zur Raumschaffung und Stabilität. Standbein bleibt am Boden, Spielbein darf sich bewegen.' }],
            phase5: [{ title: 'Täuschungen & Finten', desc: 'Wurffinte, Schrittfinte, Passfinte, Körpertäuschungen, Fehlerbilder: zu lange oder zu kurze Pausen, instabile Position, unglaubwürdige Täuschung.' }],
            phase6: [{ title: 'Täuschungen aus dem Dribbling', desc: 'In-and-Out, Crossover, Between-the-Legs, Verzögerungsdribbling.' }],
            phase7: [{ title: 'Cuts & Freilaufbewegungen', desc: 'V-Cut, L-Cut, Backdoor, Seal, Timing und Handzeichen, Kontaktaufnahme, explosive Lösung, Tempowechsel entscheidend.' }]
          }
        },
        defense: {
          title: '2. Verteidigung',
          meta: 'On-Ball-Defense, Passweg-Zustellung und Rebound-Arbeit',
          tags: ['Grundstellung', 'Slides', 'Close-out', 'Deny', 'Box-Out'],
          phases: {
            phase1: [{ title: 'Grundstellung (ready)', desc: 'Knie  gebeugt, Füße mehr als schulterbreit, Oberkörper aufrecht,  Hände seitlich vom Körper, Gewicht auf den Fußballen.' }],
            phase2: [{ title: 'Verteidigungsgrundbewegungen', desc: 'Stiefe Stellung, Fußabstand sollte hüftbreit bleiben, Überkreuzen wird vermieden, kurze Schritte.' }],
            phase3: [{ title: 'Close-out', desc: 'Sprint zum Werfer, letzten Schritte werden kürzer/kleiner, Hintern runter, Arm hoch.' }],
            phase4: [{ title: 'Deny & Passweg', desc: 'Ballnaher Fuß zwischen Angreifer und Ball, ballferner Fuß zwischen Angreifer und Korb, ballnaher Arm im Passweg, Körper ist halb in den Passweg gedreht' }],
            phase5: [{ title: 'Jump with the pass', desc: 'Verteidiger springt beim Pass einen Schritt in Richtung Korb und einen Schritt in die Passrichtung, Schneidbewegung unterbinden.' }],
            phase6: [{ title: 'Absinken, Hilfe', desc: 'Wenn eigener Gegenspieler mehr als einen Passweg entfernt --> zur Hilfe absinken, Orientierung über Korb-Korb-Linie und Hilfedreieck Ball, Mann und Korb.' }],
            phase7: [{ title: 'Ausblocken & Rebound-Arbeit', desc: 'Reihenfolge BODY - BOX - BALL, Box-Out-Position, Unterarmkontakt und einem Schritt Richtung Angreifer, T-Stellung hilft, Ball und Gegner gleichzeitig zu beobachten.' }]
          }
        },
        ballhandling: {
          title: '3. Ballhandling',
          meta: 'Dribbelvarianten, Handwechsel, Passen, Fangen und Ballschutz',
          tags: ['Handwechsel', 'Ballbehandlung', 'Passen', 'Fangen', 'Dribbling'],
          phases: {
            phase1: [{ title: 'Dribbling-Grundlagen', desc: 'Grundstellung, tiefer Stand, Körperkontrolle, sauberes Dribbling mit Fingerspitzen, Kopf hoch.' }],
            phase2: [{ title: 'Ballgefühl & Koordination', desc: 'Ballgewöhnung, Beidhändigkeit schulen, Blick vom Ball lösen.' }],
            phase3: [{ title: 'Die 4 wichtigsten Handwechsel', desc: 'Vor dem Körper, durch die Beine, hinter dem Körper, Spin-Move-Dribbling.' }],
            phase4: [{ title: 'Ballschutz/sweep', desc: 'Ball auf der ballfernen Seite führen (z.B. Hüfte), nicht offen vor dem Körper anbieten, Wischer/sweep verschafft Raum.' }],
            phase5: [{ title: 'Täuschungen aus dem Dribbling', desc: 'Dribbelfinten: In-and-Out, Tempodribbling, Verzögerungsdribbling, Richtungsfinte mit Explosivstart.' }],
            phase6: [{ title: 'Passen & Fangen', desc: 'Brustpass, Bodenpass, Überkopfpass, Einhändiger Pass, Pass hinter dem Rücken, aktives Entgegengehen und sicheres Fangen.' }]
          }
        },
        scoring: {
          title: '4. Scoring',
          meta: 'Abschlussformen am Korb, Korbleger-Varianten, Floater und Würfe',
          tags: ['Layup', 'Eurostep', 'Floater', 'Powermove', 'Up and Under'],
          phases: {
            phase1: [{ title: 'Korbleger-Grundlagen', desc: 'Schrittfolge, sauberer Ablauf, Rhythmus dribbeln, eins-zwei und hoch, Brettnutzung.' }],
            phase2: [{ title: 'Wurftechnik', desc: 'Grundlagen des einhändigen Wurfs, Würfe mit und ohne Dribbling: Freie Hand liegt als Schutz- und Stützhand seitlich am Ball, Ellenbogen unter dem Ball, Füße zeigen zum Korb, Handgelenk klappt ab.' }],
            phase3: [{ title: 'Korbleger-Varianten', desc: 'Reverse-Layup, Unterhandkorbleger, Abschluss auf der schwachen/anderen Seite (beidseitig).' }],
            phase4: [{ title: 'Korbleger-Varianten2', desc: 'Eurostep als Ausweichbewegung, Kreuzschritt-Korbleger als Alternative.' }],
            phase5: [{ title: 'Floater', desc: 'hoher Bogen, über einen Verteidiger hinweg, deutlich größere Distanz zum Korb als bei Korblegern, Floater 1-beinig und 2-beinig möglich.' }],
            phase6: [{ title: 'Zweibeinige Aktionen', desc: 'Powermove: Zweier-Kontakt-Stopp, zur Grundlinie parallele Schulterachse, beidbeiniger, kräftiger Absprung, freie Hand schützt vor Blockversuchen, eignet sich unter Bedrängnis. Oder Spin-Move: Nach dem letzten Dribbling wird der Ball auf die andere Seite gezogen, die Drehung tief ausgeführt und der Ball geschützt.' }],
            phase7: [{ title: 'Up and Under', desc: 'Jumpstopp, Wurf antäuschen, Verteidiger in die Luft ziehen, unter Gegner mit einem Kreuzschritt durchtauchen.' }]
          }
        },
        motion: {
          title: '5. Motion',
          meta: 'Laufwege, Freilaufen, Spacing und mannschaftliches Zusammenspiel',
          tags: ['Pass-Cut-Fill', 'Give and Go', 'Backdoor', 'Spacing', 'Timing'],
          phases: {
            phase1: [{ title: 'Give and Go', desc: 'Passen und sofort schneiden.' }],
            phase2: [{ title: 'Backdoor', desc: 'Lauf hinter den Verteidiger.' }],
            phase3: [{ title: 'Pass-Cut-Fill', desc: 'Lücken füllen.' }],
            phase4: [{ title: 'Dribble-at', desc: 'Raum für Mitspieler schaffen.' }],
            phase5: [{ title: 'Spacing', desc: 'Abstände halten.' }],
            phase6: [{ title: 'Timing', desc: 'Abstimmung der Bewegungen.' }],
            phase7: [{ title: 'Freies Spiel', desc: 'Anwendung der Prinzipien.' }]
          }
        },
        athletik: {
          title: '6. Athletik & Koordination',
          meta: 'Rumpfstabilität, Schnellkraft, Landetechnik und koordinative Basisfähigkeiten',
          tags: ['Stabilität', 'Schnelligkeit', 'Sprungkraft', 'Landung', 'Koordination'],
          phases: {
            phase1: [{ title: 'Mobilität & Aktivierung', desc: 'Gelenke vorbereiten, Rumpf aktivieren, Basketballgrundspannung, Movement Prep.' }],
            phase2: [{ title: 'Sprint', desc: 'Explosive erste Schritte, kurze Sprints, Reaktion auf Signal.' }],
            phase3: [{ title: 'Stoppen, Abbremsen und Landen', desc: 'Jump Stop, kontrolliertes Landen, tiefes Abfangen, Balance.' }],
            phase4: [{ title: 'Richtungswechsel', desc: 'Pendelsprint, 90-/180-Turns, Seitwärtswechsel, Re-Acceleration.' }],
            phase5: [{ title: 'Sprungkraft', desc: 'Beidbeinige und einbeinige Sprünge, vertikale Explosivität, Landekontrolle.' }],
            phase6: [{ title: 'Tests', desc: 'Testbatterie zur Leistungsüberprüfung.' }],
            phase7: [{ title: '-', desc: '-' }]
          }
        }
      };

      return {
        getStation(key) {
          return stationData[key];
        },
        getDefaultStation() {
          return 'offensive';
        }
      };
    })();

    const AppState = (() => {
      const defaultState = () => ({
        station: StationRepository.getDefaultStation(),
        phases: ['phase1', 'phase2', 'phase3', 'phase4', 'phase5', 'phase6', 'phase7'],
        note: ''
      });

      let state = defaultState();

      return {
        get() {
          return { ...state, phases: [...state.phases] };
        },
        update(patch) {
          state = { ...state, ...patch };
        },
        reset() {
          state = defaultState();
        }
      };
    })();

    const UI = (() => {
      const elements = {
        stationFilter: document.getElementById('stationFilter'),
        phases: document.getElementById('phases'),
        coachNote: document.getElementById('coachNote'),
        generateBtn: document.getElementById('generateBtn'),
        resetBtn: document.getElementById('resetBtn'),
        printBtn: document.getElementById('printBtn'),
        planTitle: document.getElementById('planTitle'),
        planInfo: document.getElementById('planInfo'),
        summaryTags: document.getElementById('summaryTags'),
        stationGrid: document.getElementById('stationGrid'),
        tabButtons: Array.from(document.querySelectorAll('.tabBtn'))
      };

      const getSelectedPhases = () => Array.from(elements.phases.selectedOptions).map(option => option.value);

      const syncFormWithState = (state) => {
        elements.stationFilter.value = state.station;
        elements.coachNote.value = state.note;

        Array.from(elements.phases.options).forEach(option => {
          option.selected = state.phases.includes(option.value);
        });

        elements.tabButtons.forEach(button => {
          button.classList.toggle('active', button.dataset.station === state.station);
        });
      };

      const renderPlan = (state) => {
        const station = StationRepository.getStation(state.station);
        const validPhases = state.phases.filter(phaseKey => {
          const phaseItems = station.phases[phaseKey] || [];
          return phaseItems.length > 0 && phaseItems[0].title !== '-';
        });

        const phaseBoxes = validPhases.map(phaseKey => {
          const number = phaseKey.replace('phase', 'Phase ');
          const items = station.phases[phaseKey] || [];
          return `
            <div class="phaseBox">
              <div class="phaseHeader">
                <div class="phaseTitle">${number}</div>
                <div class="phaseCount">${items.length} Übungsbereiche</div>
              </div>
              ${items.map(item => `
                <div style="margin-bottom:10px">
                  <strong>${item.title}</strong>
                  <div class="sessionInfo">${item.desc}</div>
                </div>
              `).join('')}
            </div>
          `;
        }).join('');

        elements.planTitle.textContent = station.title;
        elements.planInfo.textContent = `${validPhases.length} Phasen aktiv`;
        elements.summaryTags.innerHTML = `<span class="tag">${validPhases.length} Phasen</span>`;
        elements.stationGrid.innerHTML = `
          <article class="station">
            <div class="stationHead">
              <h3 class="stationTitle">${station.title}</h3>
              <div class="stationMeta">${station.meta}</div>
            </div>
            <div class="stationBody">
              <div class="tagRow">${station.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
              ${phaseBoxes}
              <div class="phaseBox">
                <div class="phaseHeader">
                  <div class="phaseTitle">Coach-Hinweis</div>
                  <div class="phaseCount">Anpassung</div>
                </div>
                <div class="sessionInfo">${state.note || 'Nutze die ausgewählten Phasen passend zur Gruppe und zum Tagesziel.'}</div>
              </div>
            </div>
          </article>
        `;
      };

      return {
        elements,
        getSelectedPhases,
        syncFormWithState,
        renderPlan
      };
    })();

    const Controller = (() => {
      const applyFormToState = () => {
        AppState.update({
          station: UI.elements.stationFilter.value,
          phases: UI.getSelectedPhases(),
          note: UI.elements.coachNote.value.trim()
        });
      };

      const render = () => {
        const state = AppState.get();
        UI.syncFormWithState(state);
        UI.renderPlan(state);
      };

      const generate = () => {
        applyFormToState();
        render();
      };

      const reset = () => {
        AppState.reset();
        render();
      };

      const selectStation = (stationKey) => {
        AppState.update({ station: stationKey });
        render();
      };

      const print = () => {
        window.print();
      };

      const bindEvents = () => {
        UI.elements.generateBtn.addEventListener('click', generate);
        UI.elements.resetBtn.addEventListener('click', reset);
        UI.elements.printBtn.addEventListener('click', print);

        ['stationFilter', 'phases'].forEach(key => {
          UI.elements[key].addEventListener('change', generate);
        });

        UI.elements.tabButtons.forEach(button => {
          button.addEventListener('click', () => {
            UI.elements.stationFilter.value = button.dataset.station;
            selectStation(button.dataset.station);
          });
        });
      };

      return {
        init() {
          bindEvents();
          render();
        }
      };
    })();

    Controller.init();
  </script>
</body>
</html>
